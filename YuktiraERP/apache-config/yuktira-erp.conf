# ============================================
# YUKTIRA ERP SUITE - Apache HTTP Server Config
# Reverse Proxy for ASP.NET Core API + Web UI
# ============================================

<VirtualHost *:80>
    ServerName yuktiraerp.com
    ServerAlias *.yuktiraerp.com

    # Redirect to HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName yuktiraerp.com
    ServerAlias *.yuktiraerp.com

    # SSL Configuration
    SSLEngine On
    SSLCertificateFile /etc/ssl/certs/yuktiraerp.crt
    SSLCertificateKeyFile /etc/ssl/private/yuktiraerp.key
    SSLCertificateChainFile /etc/ssl/certs/yuktiraerp.ca-bundle

    # Security Headers
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://code.jquery.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; img-src 'self' data:; font-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; connect-src 'self' https://api.yuktiraerp.com"

    # Logging
    LogLevel warn
    ErrorLog ${APACHE_LOG_DIR}/yuktira-error.log
    CustomLog ${APACHE_LOG_DIR}/yuktira-access.log combined

    # Gzip Compression
    AddOutputFilterByType DEFLATE text/plain text/html text/css application/javascript application/json application/xml image/svg+xml

    # ============================================
    # Static Files (Web UI - served directly by Apache)
    # ============================================
    DocumentRoot /var/www/yuktira/web

    <Directory /var/www/yuktira/web>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Cache static assets
    <FilesMatch "\.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$">
        Header set Cache-Control "max-age=2592000, public"
    </FilesMatch>

    # ============================================
    # Reverse Proxy to ASP.NET Core API
    # ============================================
    <Location /api/>
        ProxyPass http://127.0.0.1:5000/api/ timeout=300
        ProxyPassReverse http://127.0.0.1:5000/api/

        # CORS headers for API
        Header always set Access-Control-Allow-Origin "*"
        Header always set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS"
        Header always set Access-Control-Allow-Headers "Content-Type, Authorization, X-Tenant-Id"

        # Handle preflight
        RewriteCond %{REQUEST_METHOD} OPTIONS
        RewriteRule ^(.*)$ $1 [R=200,L]
    </Location>

    # ============================================
    # Multi-Tenant Subdomain Routing
    # ============================================
    # Route subdomains to tenant-specific paths
    # demo.yuktiraerp.com -> /var/www/yuktira/tenants/demo
    # acme.yuktiraerp.com -> /var/www/yuktira/tenants/acme

    RewriteCond %{HTTP_HOST} ^([a-z0-9]+)\.yuktiraerp\.com$ [NC]
    RewriteCond %{REQUEST_URI} !^/api/
    RewriteRule ^(.*)$ /tenants/%1$1 [PT,L]

    <Directory /var/www/yuktira/tenants>
        Options -Indexes +FollowSymLinks
        Require all granted
    </Directory>

    # ============================================
    # WebSocket Support (for real-time notifications)
    # ============================================
    <Location /ws>
        ProxyPass ws://127.0.0.1:5000/ws
        ProxyPassReverse ws://127.0.0.1:5000/ws
    </Location>

    # ============================================
    # Rate Limiting via mod_evasive
    # ============================================
    <IfModule mod_evasive20.c>
        DOSHashTableSize 3097
        DOSPageCount 30
        DOSSiteCount 150
        DOSPageInterval 2
        DOSSiteInterval 2
        DOSBlockingPeriod 60
    </IfModule>

    # ============================================
    # Health Check
    # ============================================
    <Location /health>
        ProxyPass http://127.0.0.1:5000/health
        ProxyPassReverse http://127.0.0.1:5000/health
        Require all granted
    </Location>
</VirtualHost>

# ============================================
# Load Balancing (for horizontal scaling)
# ============================================
<Proxy "balancer://yuktira-cluster">
    BalancerMember http://127.0.0.1:5000 route=node1
    BalancerMember http://127.0.0.1:5001 route=node2
    BalancerMember http://127.0.0.1:5002 route=node3
    ProxySet lbmethod=byrequests
    ProxySet stickysession=ROUTEID
</Proxy>
